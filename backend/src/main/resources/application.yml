spring:
  application:
    name: smartcanvas-backend
  datasource:
    url: jdbc:h2:mem:smartcanvas;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: password
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

server:
  port: 8080

jwt:
  secret: 4578b6540c451da7ebf9d3b41e8f2d5e683713f01b0a9b3a3c9b7e452a1b94d1 # Example static 256-bit hex key
  expiration: 86400000 # 24 hours
