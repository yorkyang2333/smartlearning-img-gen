spring:
  application:
    name: jincai-zhihui-backend
  datasource:
    url: jdbc:mysql://localhost:3306/jincai_zhihui?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: ""
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

server:
  port: 8080

jwt:
  secret: 4578b6540c451da7ebf9d3b41e8f2d5e683713f01b0a9b3a3c9b7e452a1b94d1 # Example static 256-bit hex key
  expiration: 86400000 # 24 hours

gateway:
  base-url: ${AI_API_BASE_URL:https://ai-generating.com}
  api-key: ${AI_API_KEY:}
  override-from-env: ${AI_API_OVERRIDE:false}
