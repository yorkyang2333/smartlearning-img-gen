# New API Gateway (AI API Gateway for SmartCanvas)
# One API 的增强版 fork，支持 SQLite 单容器部署
# Usage: docker compose -f docker-compose.gateway.yml up -d

services:
  new-api:
    image: calciumion/new-api:latest
    container_name: smartcanvas-gateway
    restart: unless-stopped
    ports:
      - "127.0.0.1:4000:3000"
    volumes:
      - ./.gateway/data:/data
    environment:
      - TZ=Asia/Shanghai
      # 初始 root 令牌（首次启动后可在面板修改）
      - INITIAL_ROOT_TOKEN=sk-smartcanvas2026
    healthcheck:
      test: ["CMD", "wget", "-q", "-T", "3", "-O", "/dev/null", "http://localhost:3000/api/status"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
